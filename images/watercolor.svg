<svg
  viewBox="0 0 1200 800"
  xmlns="http://www.w3.org/2000/svg"
  preserveAspectRatio="xMidYMid slice"
>
  <defs>
    <!-- Weicher Wasserfarben-Blur -->
    <filter id="waterBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
  </defs>

  <g
    fill="none"
    stroke="#6f8f8b"
    stroke-linecap="round"
    stroke-opacity="0.15"
    filter="url(#waterBlur)"
  >
    <!-- sehr breiter, verlaufener Hauptstrich -->
    <path
      d="M -50 180 C 250 120, 450 260, 750 200"
      stroke-width="42"
    />

    <!-- zweiter, leicht versetzt -->
    <path
      d="M 100 260 C 360 210, 600 330, 900 290"
      stroke-width="34"
    />

    <!-- kürzer, kräftig -->
    <path
      d="M 700 140 C 860 110, 1040 180, 1220 160"
      stroke-width="28"
    />

    <!-- Hintergrundfläche -->
    <path
      d="M -80 420 C 220 380, 480 520, 820 460"
      stroke-width="48"
    />

    <!-- ruhiger Abschluss -->
    <path
      d="M 300 560 C 620 520, 900 620, 1180 580"
      stroke-width="36"
    />
  </g>
</svg>
